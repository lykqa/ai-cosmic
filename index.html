<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>AI Cosmic Reading</title>
    <link rel="icon" type="image/png" href="src/assets/favicon.png">
</head>
<body>

    <div class="bg">
        <div class="bg-image"></div>
        <div class="stars"></div>
        <div class="glow"></div>
    </div>
   <div class="container">

    <div class="card" id="mainCard">

  <!-- FORM SECTION -->
  <div id="formSection">
    <p class="eyebrow">Your Fate Revealed</p>
    <h1>Decode Your Destiny</h1>
    <p class="subtitle">Powered by AI</p>

    <div class="form">
      <input type="text" id="nameInput" placeholder="Your Name" />
      <p class="error" id="nameError"></p>

      <input type="date" id="birthInput" />
      <p class="error" id="birthError"></p>

      <button id="submitBtn">Reveal My Reading</button>
    </div>
  </div>

  <!-- LOADING SECTION -->
  <div id="loadingSection" class="hidden">
    <p class="loading-text">Consulting the stars...</p>
  </div>

  <!-- RESULT SECTION -->
  <div id="resultSection" class="hidden">
    <h2 id="resultTitle"></h2>
    <p id="resultText"></p>

    <button onclick="resetApp()">Try Again</button>
  </div>

</div>

  </div>

  <script src="script.js"></script>
</body>
</html>
