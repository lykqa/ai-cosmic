<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>AI Cosmic Reading</title>
    <link rel="icon" type="image/png" href="src/assets/favicon.png">
</head>
<body>

    <div class="bg">
        <div class="bg-image"></div>
        <div class="stars"></div>
        <div class="glow"></div>
    </div>
   <div class="container">

    <div class="card">

      <p class="eyebrow">Your Fate Revealed</p>

      <h1>Decode Your Destiny Today</h1>

      <p class="subtitle">
        Powered by AI
      </p>

      <div class="form">
            <input type="text" id="nameInput" placeholder="Your Name" />
            <p class="error" id="nameError"></p>

            <input type="date" id="birthInput" />
            <p class="error" id="birthError"></p>

            <button id="submitBtn">Reveal My Reading</button>
      </div>


      <div class="stats">
        ✨ 12,483 readings generated
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
